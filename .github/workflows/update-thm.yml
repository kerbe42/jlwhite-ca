name: Update TryHackMe stats

# Refreshes src/data/thm.json from the live TryHackMe profile once a day and
# commits it if anything changed. The commit is a normal push, so Cloudflare
# Pages rebuilds the site with the new numbers. If the scrape fails the job
# goes red and nothing is committed, so the card keeps its last good values.

on:
  schedule:
    - cron: '17 6 * * *' # 06:17 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-thm
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scripts/package.json') }}

      - name: Install scraper deps
        working-directory: scripts
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Refresh stats
        working-directory: scripts
        run: node update-thm.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- src/data/thm.json; then
            echo "No change to commit."
          else
            git config user.name "thm-stats-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/thm.json
            git commit -m "chore: refresh TryHackMe stats"
            git push
          fi
